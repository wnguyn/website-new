<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#6878a0" />
		<meta name="description" content="List of blog posts" />
		<meta property="og:site_name" content="will's website!" />
		<meta property="og:url" content="/blog" />
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Blog" />
		<meta property="og:description" content="List of blog posts" />

		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Blog" />
		<meta name="twitter:description" content="List of blog posts" />

		<title>wngyn.net</title>
		<link rel="stylesheet" href="./styles.css" />

		<script src="./_app/immutable/assets/scripts/lastfm-widget.js" defer></script>
	</head>
	<body>
		<div class="the-whole-ass-thing">
			<div class="main-surface">
				<header>
					<div class="name-display">
						<b>website!</b>
					</div>
					<div class="header-lastfm" data-lastfm aria-label="Last played">
						<a class="header-lastfm-cover-link" data-lastfm-link target="_blank" rel="noopener noreferrer" title="View on Last.fm">
							<img class="header-lastfm-cover" data-lastfm-cover src="" alt="" hidden width="48" height="48" />
						</a>
						<div class="header-lastfm-text">
							<a class="header-lastfm-profile" data-lastfm-profile target="_blank" rel="noopener noreferrer">Last Played</a>
							<a class="header-lastfm-title" data-lastfm-link target="_blank" rel="noopener noreferrer"><span data-lastfm-title>loading…</span></a>
							<div class="header-lastfm-meta">
								<span data-lastfm-artist></span>
								<span data-lastfm-time></span>
							</div>
						</div>
					</div>
					<button aria-label="Toggle navigation menu" class="menu-icon" onclick="document.querySelector('nav').classList.toggle('show-mobile')">
						<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16"/><path d="M4 12h16"/><path d="M4 19h16"/></svg>
					</button>
				</header>
					<nav>
						<a href="./">
							<span class="nav-icon">
								<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
							</span>
							<div class="nav-label">Home</div>
						</a>
						<a href="./blog" class="nav-active">
							<span class="nav-icon">
								<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/></svg>
							</span>
							<div class="nav-label">Posts</div>
						</a>
						<a href="./credits">
							<span class="nav-icon">
								<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
							</span>
							<div class="nav-label">About</div>
						</a>
					</nav>
					<main class="main-panel">
						<article>
							<div role="separator" class="pixel-display title-separator">------------------------------------</div>
              <h2>Posts</h2>
              <p>Essentially write-ups for personal projects.</p>
							<section>
								<div class="posts">
									<a href="./blog/redesign" class="post">
										<h2 class="title">Actively monitoring 100,000+ last.fm scrobbles in Obsidian</h2>
										<p class="date">April 3, 2026</p>
										<p class="desc"></p>
									</a>
									<a href="./blog/test" class="post">
										<h2 class="title">test</h2>
										<p class="date">Dec 13, 2025</p>
										<p class="desc">test</p>
									</a>
								</div>
							</section>
						</article>
					</main>
				</div>
			</div>
		</div>
	</body>
</html>
